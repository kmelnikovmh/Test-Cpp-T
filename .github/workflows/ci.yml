name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Configure (Debug + sanitizers)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: Test
        run: cmake --build build --target execute-tests

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (Debug, no sanitizers on Apple)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: Test
        run: cmake --build build --target execute-tests

  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DBUILD_TESTING=ON

      - name: Test
        run: cmake --build build --target execute-tests --config Debug
